{% extends 'bookings/wizard/base_wizard.html' %}

{% block wizard_content %}
<h1 class="font-serif text-3xl text-gray-900 mb-8">Tus datos de contacto</h1>

<form method="post" id="paso-form">
  {% csrf_token %}
  <div class="grid md:grid-cols-2 gap-6">
    <div>
      <label class="label">Nombre</label>
      <input type="text" name="nombre" value="{{ form.nombre.value|default:'' }}" class="form-input" placeholder="Sofía">
    </div>
    <div>
      <label class="label">Apellidos</label>
      <input type="text" name="apellidos" value="{{ form.apellidos.value|default:'' }}" class="form-input" placeholder="Mendoza Carrillo">
    </div>
    <div>
      <label class="label">Correo electrónico</label>
      <input type="email" name="email" value="{{ form.email.value|default:'' }}" class="form-input" placeholder="sofia@correo.com">
    </div>
    <div>
      <label class="label">Teléfono</label>
      <input type="tel" name="telefono" value="{{ form.telefono.value|default:'' }}" class="form-input" placeholder="+52 998 123 4567">
    </div>
  </div>
</form>
{% endblock %}

{% block wizard_next %}
  <button type="submit" form="paso-form" class="btn-primary flex items-center gap-2">
    Continuar
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
  </button>
{% endblock %}
